<h1 mat-dialog-title >Available Batches</h1>

<mat-dialog-content>
    <table mat-table [dataSource]="dataSource">
        <ng-container matColumnDef="BatchNumber">
            <th mat-header-cell *matHeaderCellDef> Batch Number </th>
            <td mat-cell *matCellDef="let element" data-label="Batch Number">{{element.BatchNum}}</td>
        </ng-container>
        <ng-container matColumnDef="ExpiryDate">
            <th mat-header-cell *matHeaderCellDef> Expiry Date </th>
            <td mat-cell *matCellDef="let element" data-label="Expiry Date">{{element.ExpDate | date : 'short'}}</td>
        </ng-container>
        <ng-container matColumnDef="InDate">
            <th mat-header-cell *matHeaderCellDef> Admission Date </th>
            <td mat-cell *matCellDef="let element" data-label="Admission Date">{{element.InDate | date : 'short'}}</td>
        </ng-container>
        <ng-container matColumnDef="Quantity">
            <th mat-header-cell *matHeaderCellDef> Quantity </th>
            <td mat-cell *matCellDef="let element" data-label="Quantity">{{element.Quantity}}</td>
        </ng-container>
        <ng-container matColumnDef="IsCommited">
            <th mat-header-cell *matHeaderCellDef> Committed </th>
            <td mat-cell *matCellDef="let element" data-label="Commited">{{element.IsCommited}}</td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-flat-button color="primary" (click)="close()">Close</button>
</mat-dialog-actions>
