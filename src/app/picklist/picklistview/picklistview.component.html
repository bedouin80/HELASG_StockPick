<h1>View Pick List</h1>
<button mat-flat-button color="primary" (click)="close()" >Back</button>&nbsp;&nbsp;
<button mat-flat-button color="primary" (click)="complete()" [disabled]="!canComplete">Complete</button>&nbsp;&nbsp;
<button mat-flat-button color="primary" (click)="unlock()" [disabled]="!canUnlock">Unlock</button>
<div>
    <table mat-table [dataSource]="dataSource">
        <ng-container matColumnDef="Description">
            <th mat-header-cell *matHeaderCellDef> Description </th>
            <td mat-cell *matCellDef="let element" data-label="Description">{{element.Description}}</td>
        </ng-container>
        <ng-container matColumnDef="ItemCode">
            <th mat-header-cell *matHeaderCellDef> Item Code </th>
            <td mat-cell *matCellDef="let element" data-label="Item Code">[{{element.Whse}}] {{element.ItemCode}} - {{element.ItemBarcode}}</td>
        </ng-container>
        <ng-container matColumnDef="quantity">
            <th mat-header-cell *matHeaderCellDef> Qty </th>
            <td mat-cell *matCellDef="let element" data-label="Req. / Pick Qty"> {{element.AvailQty}} / {{element.PickQty}} {{element.UOM}}</td>
        </ng-container>
        <ng-container matColumnDef="Action">
            <th mat-header-cell *matHeaderCellDef> Actions </th>
            <td mat-cell *matCellDef="let element">
                <button class="btn"
                        (click)="pickBatch(element)"
                        [disabled]="disableButton(element)"
                        [ngClass]="{'btn-success': element.AvailQty == element.PickQty,
                                    'btn-primary': element.AvailQty != element.PickQty}"
                        >
                    Pick
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
</div>
